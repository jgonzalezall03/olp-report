<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - OLP Dashboard</title>
  <style>
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3a8a, #4338ca); color: white; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); border-radius: 24px; padding: 36px; width: min(420px, 90vw); box-shadow: 0 24px 80px rgba(15,23,42,0.25); }
    h1 { margin: 0 0 12px; font-size: 2rem; }
    label { display: block; margin-top: 18px; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.9; }
    input { width: 100%; margin-top: 8px; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.1); color: white; }
    button { margin-top: 24px; width: 100%; padding: 14px 16px; border: none; border-radius: 14px; background: #6366f1; color: white; font-size: 1rem; cursor: pointer; }
    .error { margin-top: 16px; color: #fecaca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Iniciar sesión</h1>
    <form method="post" action="/login">
      <label for="username">Usuario</label>
      <input id="username" name="username" type="text" required autofocus />
      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" required />
      <button type="submit">Entrar</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
